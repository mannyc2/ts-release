name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release package
    if: github.repository == 'mannyc2/ts-release' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Run release checks
        run: bun run check:release

      - name: Check release eligibility
        id: eligibility
        run: bun run apps/release-ts/scripts/check-release-eligibility.ts

      - name: Build release artifacts
        if: steps.eligibility.outputs.should_release == 'true'
        run: bun run release:artifacts

      - name: Record release plan
        if: steps.eligibility.outputs.should_release == 'true'
        run: bun apps/release-ts/src/cli/main.ts plan --config apps/release-ts/release.config.json --format text --out .release/evidence/plan.txt

      - name: Run approved release
        if: steps.eligibility.outputs.should_release == 'true'
        run: bun apps/release-ts/src/cli/main.ts run --config apps/release-ts/release.config.json --execute --approve-irreversible

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence
          path: .release/evidence/**
          if-no-files-found: ignore
