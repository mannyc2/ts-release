name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run cli validate-config --config release.config.json
      - run: bun run cli plan --config release.config.json --format markdown > release-plan.md
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-plan
          path: |
            release-plan.md
            .release/evidence/

  execute:
    needs: plan
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@^11.5.1
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run cli run --config release.config.json --execute --approve-irreversible
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-evidence
          path: .release/evidence/
